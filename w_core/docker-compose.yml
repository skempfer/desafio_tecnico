services:
  w_core:
    build:
      context: .
      dockerfile: Dockerfile
    image: w-core:step5
    container_name: w-core-step5
    ports:
      - "4000:4000"
    environment:
      PHX_SERVER: "true"
      PHX_HOST: "localhost"
      PORT: "4000"
      DATABASE_PATH: /app/data/w_core.sqlite3
      SECRET_KEY_BASE: ${SECRET_KEY_BASE:-please_change_this_in_production}
    volumes:
      - wcore_data:/app/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://127.0.0.1:4000/ >/dev/null || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 5
      start_period: 20s

volumes:
  wcore_data:
